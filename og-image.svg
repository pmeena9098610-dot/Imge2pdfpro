<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(99,102,241,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(34,211,238,0.05)"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#6366F1" opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#22D3EE" opacity="0.05"/>
  <circle cx="1050" cy="80" r="120" fill="#6366F1" opacity="0.08"/>
  
  <!-- Card area -->
  <rect x="60" y="60" width="1080" height="510" rx="20" fill="url(#card)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  
  <!-- Gradient accent bar -->
  <rect x="60" y="60" width="1080" height="6" rx="3" fill="url(#accent)"/>
  
  <!-- Badge -->
  <rect x="80" y="100" width="220" height="36" rx="18" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="190" y="124" font-family="Arial, sans-serif" font-size="14" fill="#A5B4FC" text-anchor="middle">🇮🇳 India's #1 Free PDF Tool</text>
  
  <!-- Main Title -->
  <text x="80" y="210" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="white">Photo ko PDF</text>
  <text x="80" y="280" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="url(#accent)">Kaise Banaye</text>
  
  <!-- Subtitle -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="26" fill="#94A3B8">Free • Offline • 100% Secure • No Upload</text>
  
  <!-- Features row -->
  <rect x="80" y="390" width="200" height="44" rx="12" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <text x="180" y="418" font-family="Arial, sans-serif" font-size="16" fill="#86EFAC" text-anchor="middle">✅ JPG to PDF</text>
  
  <rect x="296" y="390" width="200" height="44" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="396" y="418" font-family="Arial, sans-serif" font-size="16" fill="#A5B4FC" text-anchor="middle">🖨️ Cyber Cafe Print</text>
  
  <rect x="512" y="390" width="200" height="44" rx="12" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
  <text x="612" y="418" font-family="Arial, sans-serif" font-size="16" fill="#67E8F9" text-anchor="middle">📦 Compress 100KB</text>
  
  <rect x="728" y="390" width="200" height="44" rx="12" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.4)" stroke-width="1"/>
  <text x="828" y="418" font-family="Arial, sans-serif" font-size="16" fill="#FDE68A" text-anchor="middle">⚡ Works Offline</text>
  
  <!-- Domain badge -->
  <rect x="80" y="470" width="260" height="50" rx="25" fill="url(#accent)"/>
  <text x="210" y="502" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">photosepdf.in</text>
  
  <!-- Right side icon area -->
  <text x="1020" y="350" font-family="Arial, sans-serif" font-size="120" text-anchor="middle">📄</text>
  <text x="1020" y="440" font-family="Arial, sans-serif" font-size="22" fill="#64748B" text-anchor="middle">Image to PDF Pro</text>
</svg>
